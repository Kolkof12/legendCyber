<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>WXL Store</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🛒 WXL Store</h1>
  <div id="coins">Coins: 0</div>
</header>

<section class="auth">
  <input type="text" id="username" placeholder="اسم المستخدم">
  <button onclick="login()">دخول</button>
</section>

<section class="card">
  <h2>💳 بطاقتك</h2>
  <div class="card-box" id="card">
    <p id="card-number"></p>
    <p id="card-code"></p>
  </div>
  <button onclick="changeColor()">تغيير اللون</button>
</section>

<section class="daily">
  <button onclick="dailyReward()">🎁 استلام 70 عملة</button>
</section>

<section class="products" id="products"></section>

<script src="script.js"></script>
</body>
</html>
